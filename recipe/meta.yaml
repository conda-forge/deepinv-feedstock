{% set python_min = "3.10" %}
{% set name = "deepinv" %}
{% set version = "0.3.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/deepinv/deepinv/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0d113976de07ab830f8b190d1cf9b4ba9a3e6f0f4ae3e3396236e7e134fe1b36

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.2
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - matplotlib-base
    - hdf5storage
    - tqdm
    - pytorch >=2.2.0
    - torchvision
    - torchmetrics
    - einops
    - wandb
    - scipy
    - natsort

test:
  imports:
    - deepinv
  commands:
    - pip check
    - pip install ptwt bm3d
    - pytest deepinv/tests -x -v -k "not test_ncsnpp_net and not test_load_ and not (test_algo_inpaint and DDRM) and not (test_build_algo and SKRock)"
  source_files:
    - deepinv/tests/*
    - deepinv/tests/assets/generators/*
  requires:
    - python {{ python_min }}
    - pip
    - pytest
    - datasets
    - ipython
    - timm
    - pywavelets
    - kornia
    - torchkbnufft
    - sigpy
    - mat73

about:
  summary: Pytorch library for solving inverse problems with deep learning
  dev_url: https://github.com/deepinv/deepinv
  home: https://github.com/deepinv/deepinv
  license: BSD-3-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - gschramm
    - tachella
    - matthieutrs
